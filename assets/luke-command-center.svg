<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Luke Encrapera Command Center</title>
  <desc id="desc">Animated command center banner for AI engineering, security architecture, and automation systems.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="42%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1220" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#060b16" stop-opacity="0.9"/>
    </linearGradient>

    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="26" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="panelClip" clipPathUnits="userSpaceOnUse">
      <rect x="4" y="4" width="1192" height="512" rx="30"/>
    </clipPath>

    <style>
      .title {
        font: 800 66px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        letter-spacing: 1.4px;
        fill: #f8fafc;
      }
      .subtitle {
        font: 600 23px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        letter-spacing: 0.6px;
        fill: #c7d2fe;
      }
      .tagline {
        font: 600 28px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        letter-spacing: 0.4px;
        fill: #e2e8f0;
      }
      .small {
        font: 600 13px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        letter-spacing: 1.4px;
        fill: #93c5fd;
      }
      .cardTitle {
        font: 700 19px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        fill: #f8fafc;
      }
      .cardBody {
        font: 500 13px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        fill: #cbd5e1;
      }
      .chip {
        font: 700 13px "Trebuchet MS", "Segoe UI", "Arial", sans-serif;
        letter-spacing: 0.6px;
        fill: #dbeafe;
      }
    </style>
  </defs>

  <rect x="4" y="4" width="1192" height="512" rx="30" fill="url(#bg)"/>
  <rect x="4" y="4" width="1192" height="512" rx="30" fill="url(#grid)" opacity="0.4"/>

  <circle cx="1080" cy="96" r="142" fill="#38bdf8" opacity="0.14" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.08;0.2;0.08" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="990" cy="420" r="130" fill="#7c3aed" opacity="0.15" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.1;0.22;0.1" dur="7s" repeatCount="indefinite"/>
  </circle>

  <g clip-path="url(#panelClip)">
    <rect x="-300" y="0" width="260" height="520" fill="url(#sweep)" transform="skewX(-14)">
      <animate attributeName="x" values="-340;1320" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>

  <rect x="22" y="22" width="1156" height="476" rx="26" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.78">
    <animate attributeName="opacity" values="0.55;0.9;0.55" dur="5.4s" repeatCount="indefinite"/>
  </rect>

  <g>
    <circle cx="1124" cy="52" r="5" fill="#22d3ee">
      <animate attributeName="r" values="4;7;4" dur="2.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1144" cy="52" r="5" fill="#7c3aed">
      <animate attributeName="r" values="4;7;4" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;1;0.45" dur="2.8s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(54,94)">
    <text class="small" x="0" y="0">AI AND SONS | OPERATOR COMMAND CENTER</text>
    <text class="title" x="0" y="88">LUKE ENCRAPERA
      <animate attributeName="opacity" values="0.82;1;0.82" dur="4.8s" repeatCount="indefinite"/>
    </text>
    <text class="subtitle" x="0" y="132">AI Engineer | Security Architect | Founder</text>
    <text class="tagline" x="0" y="206">Build systems that build systems.</text>

    <line x1="0" y1="232" x2="546" y2="232" stroke="url(#accent)" stroke-width="3" opacity="0.88">
      <animate attributeName="x2" values="260;546;260" dur="5.2s" repeatCount="indefinite"/>
    </line>

    <text class="cardBody" x="0" y="278">Agentic platforms, identity automation, and secure enterprise AI delivery.</text>
    <text class="cardBody" x="0" y="304">Designed for real operators and real production constraints.</text>
  </g>

  <g transform="translate(668,92)">
    <text class="small" x="0" y="0">OPERATIONAL DOMAINS</text>

    <rect x="0" y="26" width="488" height="76" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1"/>
    <text class="cardTitle" x="20" y="56">AI Engineering</text>
    <text class="cardBody" x="20" y="79">Multi-model orchestration</text>
    <text class="cardBody" x="20" y="96">and practical deployment patterns</text>

    <rect x="0" y="116" width="488" height="76" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1"/>
    <text class="cardTitle" x="20" y="146">Agentic Automation</text>
    <text class="cardBody" x="20" y="169">Tool-calling workflows</text>
    <text class="cardBody" x="20" y="186">with end-to-end execution loops</text>

    <rect x="0" y="206" width="488" height="76" rx="14" fill="url(#card)" stroke="#334155" stroke-width="1"/>
    <text class="cardTitle" x="20" y="236">Identity and Security</text>
    <text class="cardBody" x="20" y="259">Enterprise controls, IAM architecture,</text>
    <text class="cardBody" x="20" y="276">and governance by design</text>
  </g>

  <g transform="translate(52,432)">
    <rect x="0" y="0" width="252" height="40" rx="10" fill="#0b1220" stroke="#334155">
      <animate attributeName="stroke" values="#334155;#22d3ee;#334155" dur="4.6s" repeatCount="indefinite"/>
    </rect>
    <text class="chip" x="18" y="26">SECURITY-FIRST BUILDS</text>

    <rect x="268" y="0" width="252" height="40" rx="10" fill="#0b1220" stroke="#334155">
      <animate attributeName="stroke" values="#334155;#7c3aed;#334155" dur="4.6s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text class="chip" x="286" y="26">AUTOMATION-BY-DEFAULT</text>

    <rect x="536" y="0" width="296" height="40" rx="10" fill="#0b1220" stroke="#334155">
      <animate attributeName="stroke" values="#334155;#22d3ee;#334155" dur="4.6s" begin="3s" repeatCount="indefinite"/>
    </rect>
    <text class="chip" x="554" y="26">ENTERPRISE AI EXECUTION</text>
  </g>
</svg>

<svg width="1200" height="440" viewBox="0 0 1200 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mission Radar</title>
  <desc id="desc">Capability radar visualization for Luke Encrapera.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#060b16"/>
      <stop offset="50%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .headline { font: 700 38px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; fill: #f8fafc; }
      .small { font: 600 13px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; letter-spacing: 1.3px; fill: #93c5fd; }
      .label { font: 700 16px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; fill: #e2e8f0; }
      .value { font: 700 18px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; fill: #22d3ee; }
      .coreTitle { font: 700 20px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; fill: #f8fafc; }
      .coreBody { font: 500 13px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; fill: #cbd5e1; }
    </style>
  </defs>

  <rect x="4" y="4" width="1192" height="432" rx="26" fill="url(#bg)"/>
  <rect x="4" y="4" width="1192" height="432" rx="26" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.8"/>

  <text x="42" y="58" class="headline">Mission Radar</text>
  <text x="44" y="82" class="small">CAPABILITY SIGNAL MAP</text>

  <g transform="translate(420,228)">
    <circle r="140" fill="none" stroke="#334155" stroke-width="1"/>
    <circle r="108" fill="none" stroke="#334155" stroke-width="1"/>
    <circle r="76" fill="none" stroke="#334155" stroke-width="1"/>
    <circle r="44" fill="none" stroke="#334155" stroke-width="1"/>
    <line x1="-156" y1="0" x2="156" y2="0" stroke="#334155" stroke-width="1"/>
    <line x1="0" y1="-156" x2="0" y2="156" stroke="#334155" stroke-width="1"/>
    <line x1="-112" y1="-112" x2="112" y2="112" stroke="#334155" stroke-width="1"/>
    <line x1="-112" y1="112" x2="112" y2="-112" stroke="#334155" stroke-width="1"/>

    <polygon points="0,-132 116,-26 84,84 -68,118 -128,-8" fill="#22d3ee" opacity="0.18" stroke="#22d3ee" stroke-width="2" filter="url(#glow)"/>

    <circle r="40" fill="#0b1220" stroke="url(#ring)" stroke-width="2"/>
    <text text-anchor="middle" y="-4" class="coreTitle">CORE</text>
    <text text-anchor="middle" y="14" class="coreBody">Operator</text>
    <text text-anchor="middle" y="30" class="coreBody">Execution</text>
  </g>

  <g transform="translate(790,124)">
    <text class="label" x="0" y="0">AI Engineering</text>
    <text class="value" x="240" y="0">97%</text>
    <line x1="0" y1="14" x2="274" y2="14" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="14" x2="266" y2="14" stroke="#22d3ee" stroke-width="7" stroke-linecap="round"/>

    <text class="label" x="0" y="58">Agentic Automation</text>
    <text class="value" x="240" y="58">95%</text>
    <line x1="0" y1="72" x2="274" y2="72" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="72" x2="260" y2="72" stroke="#22d3ee" stroke-width="7" stroke-linecap="round"/>

    <text class="label" x="0" y="116">Identity Architecture</text>
    <text class="value" x="240" y="116">93%</text>
    <line x1="0" y1="130" x2="274" y2="130" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="130" x2="255" y2="130" stroke="#22d3ee" stroke-width="7" stroke-linecap="round"/>

    <text class="label" x="0" y="174">Security Engineering</text>
    <text class="value" x="240" y="174">96%</text>
    <line x1="0" y1="188" x2="274" y2="188" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="188" x2="262" y2="188" stroke="#22d3ee" stroke-width="7" stroke-linecap="round"/>

    <text class="label" x="0" y="232">Platform Reliability</text>
    <text class="value" x="240" y="232">92%</text>
    <line x1="0" y1="246" x2="274" y2="246" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="246" x2="251" y2="246" stroke="#22d3ee" stroke-width="7" stroke-linecap="round"/>
  </g>

  <text x="44" y="398" class="small">SIGNAL: HIGH CONFIDENCE | MODE: BUILD SYSTEMS THAT BUILD SYSTEMS</text>
</svg>

<svg width="1200" height="430" viewBox="0 0 1200 430" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Luke Encrapera Terminal Window</title>
  <desc id="desc">Animated terminal window with progressive command playback.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="55%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <clipPath id="cmd1Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="110" width="0" height="30">
        <animate attributeName="width" values="0;102;102;102;0" keyTimes="0;0.025;0.10;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="out1Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="142" width="0" height="30">
        <animate attributeName="width" values="0;230;230;230;0" keyTimes="0;0.1125;0.20;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="cmd2Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="184" width="0" height="30">
        <animate attributeName="width" values="0;165;165;165;0" keyTimes="0;0.2375;0.31875;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="out2Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="216" width="0" height="30">
        <animate attributeName="width" values="0;620;620;620;0" keyTimes="0;0.3375;0.45;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="cmd3Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="258" width="0" height="30">
        <animate attributeName="width" values="0;130;130;130;0" keyTimes="0;0.4875;0.56875;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="out3Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="290" width="0" height="30">
        <animate attributeName="width" values="0;670;670;670;0" keyTimes="0;0.5875;0.7125;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="cmd4Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="332" width="0" height="30">
        <animate attributeName="width" values="0;100;100;100;0" keyTimes="0;0.75;0.825;0.97;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
    <clipPath id="out4Clip" clipPathUnits="userSpaceOnUse">
      <rect x="86" y="364" width="0" height="30">
        <animate attributeName="width" values="0;690;690;690;0" keyTimes="0;0.8375;0.975;0.99;1" dur="16s" repeatCount="indefinite"/>
      </rect>
    </clipPath>

    <style>
      .title { font: 700 17px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; fill: #e2e8f0; }
      .mono { font: 600 24px "JetBrains Mono", "Consolas", "Menlo", monospace; }
      .prompt { fill: #22d3ee; }
      .cmd { fill: #f8fafc; }
      .out { fill: #cbd5e1; }
      .cursor { fill: #7c3aed; }
      .meta { font: 600 11px "Trebuchet MS", "Segoe UI", "Arial", sans-serif; letter-spacing: 1.2px; fill: #93c5fd; }
    </style>
  </defs>

  <rect x="4" y="4" width="1192" height="422" rx="24" fill="url(#bg)"/>
  <rect x="4" y="4" width="1192" height="422" rx="24" fill="none" stroke="url(#accent)" stroke-width="1.5"/>

  <rect x="34" y="28" width="1132" height="54" rx="12" fill="#0b1220" stroke="#334155"/>
  <circle cx="64" cy="55" r="8" fill="#ef4444"/>
  <circle cx="88" cy="55" r="8" fill="#f59e0b"/>
  <circle cx="112" cy="55" r="8" fill="#22c55e"/>
  <text x="140" y="61" class="title">luke@command-center: ~/profile</text>

  <rect x="34" y="96" width="1132" height="300" rx="12" fill="#060b16" stroke="#334155"/>

  <rect x="38" y="110" width="1124" height="34" fill="#22d3ee" opacity="0.08">
    <animate attributeName="y" values="110;110;184;184;258;258;332;332;332" keyTimes="0;0.22;0.24;0.47;0.49;0.72;0.74;0.96;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <text x="56" y="132" class="mono prompt">$</text>
  <text x="86" y="132" class="mono cmd" clip-path="url(#cmd1Clip)">whoami</text>
  <text x="86" y="164" class="mono out" clip-path="url(#out1Clip)">Luke Encrapera</text>

  <text x="56" y="206" class="mono prompt">$</text>
  <text x="86" y="206" class="mono cmd" clip-path="url(#cmd2Clip)">profession</text>
  <text x="86" y="238" class="mono out" clip-path="url(#out2Clip)">AI Engineer | Security Architect | Founder</text>

  <text x="56" y="280" class="mono prompt">$</text>
  <text x="86" y="280" class="mono cmd" clip-path="url(#cmd3Clip)">building</text>
  <text x="86" y="312" class="mono out" clip-path="url(#out3Clip)">agentic AI platforms through AI and Sons</text>

  <text x="56" y="354" class="mono prompt">$</text>
  <text x="86" y="354" class="mono cmd" clip-path="url(#cmd4Clip)">focus</text>
  <text x="86" y="386" class="mono out" clip-path="url(#out4Clip)">automation, intelligence, identity architecture</text>

  <rect x="188" y="108" width="12" height="28" rx="2" class="cursor" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.025;0.095;0.11;1" dur="16s" repeatCount="indefinite"/>
  </rect>
  <rect x="254" y="182" width="12" height="28" rx="2" class="cursor" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.2375;0.313;0.33;1" dur="16s" repeatCount="indefinite"/>
  </rect>
  <rect x="226" y="256" width="12" height="28" rx="2" class="cursor" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.4875;0.562;0.58;1" dur="16s" repeatCount="indefinite"/>
  </rect>
  <rect x="174" y="330" width="12" height="28" rx="2" class="cursor" opacity="0">
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.75;0.818;0.835;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <rect x="790" y="366" width="14" height="28" rx="3" class="cursor" opacity="0">
    <animate attributeName="opacity" values="0;0;1;0;1;0;1" keyTimes="0;0.94;0.95;0.96;0.97;0.98;1" dur="16s" repeatCount="indefinite"/>
  </rect>

  <text x="46" y="414" class="meta">TERMINAL MODE: OPERATOR EXECUTION | STATUS: ONLINE</text>
</svg>
